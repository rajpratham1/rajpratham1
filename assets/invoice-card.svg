<svg width="900" height="340" viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="invBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#131a24"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <clipPath id="invFrame"><rect width="900" height="340" rx="14"/></clipPath>
  </defs>
  <g clip-path="url(#invFrame)">
    <rect width="900" height="340" fill="url(#invBg)"/>
    <text x="40" y="34" font-family="Consolas, Monaco, monospace" font-size="13" fill="#5fd9b4">$ billorax invoice --generate</text>

    <!-- invoice card -->
    <g filter="url(#cardShadow)">
      <rect x="250" y="40" width="400" height="260" rx="10" fill="#ffffff"/>
    </g>

    <!-- header -->
    <rect x="250" y="40" width="400" height="60" rx="10" fill="#00aeff"/>
    <rect x="250" y="80" width="400" height="20" fill="#00aeff"/>
    <text x="274" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">BilloraX</text>
    <text x="626" y="70" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#e6f7ff">INVOICE #BX-2026-0417</text>

    <line x1="274" y1="120" x2="626" y2="120" stroke="#e5e9ef" stroke-width="1"/>

    
    <text x="274" y="140" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#3a3f4b">
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.14;0.15" dur="10s" repeatCount="indefinite" fill="freeze"/>
      Cloud Hosting — Pro Plan
    </text>
    <text x="626" y="140" text-anchor="end" font-family="Consolas, Monaco, monospace" font-size="13" fill="#1f7a4d" font-weight="700">
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.14;0.15" dur="10s" repeatCount="indefinite" fill="freeze"/>
      $49.00
    </text>
    <text x="274" y="170" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#3a3f4b">
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.2;0.21" dur="10s" repeatCount="indefinite" fill="freeze"/>
      API Requests (12,400)
    </text>
    <text x="626" y="170" text-anchor="end" font-family="Consolas, Monaco, monospace" font-size="13" fill="#1f7a4d" font-weight="700">
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.2;0.21" dur="10s" repeatCount="indefinite" fill="freeze"/>
      $18.50
    </text>
    <text x="274" y="200" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#3a3f4b">
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.26;0.27" dur="10s" repeatCount="indefinite" fill="freeze"/>
      Team Seats (3)
    </text>
    <text x="626" y="200" text-anchor="end" font-family="Consolas, Monaco, monospace" font-size="13" fill="#1f7a4d" font-weight="700">
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.26;0.27" dur="10s" repeatCount="indefinite" fill="freeze"/>
      $27.00
    </text>
    <text x="274" y="230" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#3a3f4b">
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.32;0.33" dur="10s" repeatCount="indefinite" fill="freeze"/>
      Priority Support
    </text>
    <text x="626" y="230" text-anchor="end" font-family="Consolas, Monaco, monospace" font-size="13" fill="#1f7a4d" font-weight="700">
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.32;0.33" dur="10s" repeatCount="indefinite" fill="freeze"/>
      $15.00
    </text>

    <line x1="274" y1="264" x2="626" y2="264" stroke="#e5e9ef" stroke-width="1"/>

    <text x="274" y="294" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#0d1117">
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.42;0.43" dur="10s" repeatCount="indefinite" fill="freeze"/>
      Total Due
    </text>
    <text x="626" y="294" text-anchor="end" font-family="Consolas, Monaco, monospace" font-size="17" font-weight="700" fill="#00aeff">
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.42;0.43" dur="10s" repeatCount="indefinite" fill="freeze"/>
      $109.50
    </text>

    <!-- paid stamp -->
    <g transform="translate(580,320) rotate(-18)">
      <rect x="-46" y="-16" width="92" height="32" rx="6" fill="none" stroke="#22c55e" stroke-width="2.5" opacity="0">
        <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.48;0.49" dur="10s" repeatCount="indefinite" fill="freeze"/>
      </rect>
      <text text-anchor="middle" dominant-baseline="central" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="800" fill="#22c55e" opacity="0">
        <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.48;0.49" dur="10s" repeatCount="indefinite" fill="freeze"/>
        PAID
      </text>
    </g>

    <text x="450.0" y="324" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#5b7285">automated invoicing, generated in real time</text>
  </g>
  <rect x="0.5" y="0.5" width="899" height="339" rx="14" fill="none" stroke="#22303f"/>
</svg>