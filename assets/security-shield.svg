<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080b12"/>
      <stop offset="100%" stop-color="#0c1220"/>
    </linearGradient>
    <linearGradient id="shieldFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1b2735"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
    <clipPath id="shieldFrame"><rect width="900" height="300" rx="14"/></clipPath>
    <clipPath id="shieldShape">
      <path d="M450.0,65 L520.0,90 L520.0,160 C520.0,215 485.0,245 450.0,260 C415.0,245 380.0,215 380.0,160 L380.0,90 Z"/>
    </clipPath>
  </defs>
  <g clip-path="url(#shieldFrame)">
    <rect width="900" height="300" fill="url(#shieldBg)"/>
    <text x="40" y="34" font-family="Consolas, Monaco, monospace" font-size="13" fill="#5fd9b4">$ security --scan --target billorax-prod</text>

    <!-- shield outline -->
    <path d="M450.0,65 L520.0,90 L520.0,160 C520.0,215 485.0,245 450.0,260 C415.0,245 380.0,215 380.0,160 L380.0,90 Z"
      fill="url(#shieldFill)" stroke="#2dd4bf" stroke-width="2"/>

    <!-- scanning sweep clipped inside shield -->
    <g clip-path="url(#shieldShape)">
      <rect x="360.0" y="40" width="180" height="26" fill="#2dd4bf" opacity="0.55">
        <animateTransform attributeName="transform" type="translate" from="0,0" to="0,220" dur="2.2s" repeatCount="indefinite"/>
      </rect>
      <!-- faint grid inside shield -->
      <g stroke="#2dd4bf" stroke-opacity="0.15">
        <line x1="380.0" y1="80" x2="520.0" y2="80"/>
        <line x1="380.0" y1="120" x2="520.0" y2="120"/>
        <line x1="380.0" y1="160" x2="520.0" y2="160"/>
        <line x1="380.0" y1="200" x2="520.0" y2="200"/>
      </g>
    </g>

    <!-- checkmark draws in after scan completes -->
    <path d="M422.0,160 L442.0,182 L484.0,132" fill="none" stroke="#22c55e" stroke-width="7"
      stroke-linecap="round" stroke-linejoin="round"
      stroke-dasharray="90" stroke-dashoffset="90">
      <animate attributeName="stroke-dashoffset" values="90;90;0;0" keyTimes="0;0.72;0.86;1" dur="4.4s" repeatCount="indefinite"/>
    </path>

    <!-- pulse ring on completion -->
    <circle cx="450.0" cy="152" r="10" fill="none" stroke="#22c55e" stroke-width="2" opacity="0">
      <animate attributeName="r" values="10;70" keyTimes="0;1" begin="3.2s" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0" keyTimes="0;1" begin="3.2s" dur="1.2s" repeatCount="indefinite"/>
    </circle>

    <!-- status text -->
    <text x="450.0" y="300" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="14" fill="#8fe3c7">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.7;0.72;0.99;1" dur="4.4s" repeatCount="indefinite"/>
      scanning for vulnerabilities...
    </text>
    <text x="450.0" y="300" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="14" font-weight="700" fill="#22c55e" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.72;0.75;0.99;1" dur="4.4s" repeatCount="indefinite"/>
      no threats found — system secure
    </text>
  </g>
  <rect x="0.5" y="0.5" width="899" height="299" rx="14" fill="none" stroke="#22303f"/>
</svg>