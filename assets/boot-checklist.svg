      <stop offset="0%" stop-color="#05070c"/>
      <stop offset="100%" stop-color="#0a0f18"/>
    </linearGradient>
    <clipPath id="bootFrame"><rect width="900" height="300" rx="14"/></clipPath>
  </defs>
