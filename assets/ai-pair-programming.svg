<svg width="900" height="360" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aiBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0715"/>
      <stop offset="100%" stop-color="#0c1220"/>
    </linearGradient>
    <clipPath id="aiFrame"><rect width="900" height="360" rx="14"/></clipPath>
  </defs>
  <g clip-path="url(#aiFrame)">
    <rect width="900" height="360" fill="url(#aiBg)"/>
    <text x="40" y="30" font-family="Consolas, Monaco, monospace" font-size="13" fill="#a78bfa">$ ai-pair --assist billorax-auth</text>

    <!-- divider -->
    <line x1="530" y1="14" x2="530" y2="346" stroke="#22283a" stroke-width="1"/>

    <!-- You prompt bubble -->
    <rect x="40" y="52" width="460" height="40" rx="10" fill="#171126" stroke="#3a2f57" stroke-width="1">
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.025;0.033" dur="12.0s" repeatCount="indefinite"/>
    </rect>
    <text x="56" y="76" font-family="Consolas, Monaco, monospace" font-size="12.5" fill="#c4b5fd">
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.025;0.033" dur="12.0s" repeatCount="indefinite"/>
      You: generate a secure JWT auth middleware
    </text>

    <!-- thinking indicator -->
    <g>
      <text x="56" y="118" font-family="Consolas, Monaco, monospace" font-size="12.5" fill="#7c5cff">
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.158;0.163;0.275;1" dur="12.0s" repeatCount="indefinite"/>
        AI is thinking
      </text>
      <circle cx="148" cy="114" r="2.6" fill="#7c5cff">
        <animate attributeName="opacity" values="0;0;1;0.3;1;0" keyTimes="0;0.158;0.163;0.183;0.204;0.275" dur="12.0s" repeatCount="indefinite"/>
      </circle>
      <circle cx="158" cy="114" r="2.6" fill="#7c5cff">
        <animate attributeName="opacity" values="0;0;1;0.3;1;0" keyTimes="0;0.167;0.171;0.192;0.212;0.275" dur="12.0s" repeatCount="indefinite"/>
      </circle>
      <circle cx="168" cy="114" r="2.6" fill="#7c5cff">
        <animate attributeName="opacity" values="0;0;1;0.3;1;0" keyTimes="0;0.175;0.179;0.2;0.221;0.275" dur="12.0s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- AI response code -->
    <rect x="40" y="140" width="460" height="200" rx="10" fill="#0f1420" stroke="#22283a" stroke-width="1">
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.275;0.279" dur="12.0s" repeatCount="indefinite"/>
    </rect>
    <text x="56" y="164" font-family="Consolas, Monaco, monospace" font-size="12" fill="#7c5cff" font-weight="700">
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.275;0.279" dur="12.0s" repeatCount="indefinite"/>
      AI:
    </text>
    
    <text x="60" y="205.0" font-family="Consolas, Monaco, monospace" font-size="12.5" fill="#9cdcfe">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.275;0.282;0.94;1" dur="12.0s" repeatCount="indefinite"/>
      function authGuard(req, res, next) {
    </text>
    <text x="60" y="225.5" font-family="Consolas, Monaco, monospace" font-size="12.5" fill="#9cdcfe">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.298;0.305;0.94;1" dur="12.0s" repeatCount="indefinite"/>
        const token = req.headers.authorization?.split(' ')[1];
    </text>
    <text x="60" y="246.0" font-family="Consolas, Monaco, monospace" font-size="12.5" fill="#9cdcfe">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.322;0.328;0.94;1" dur="12.0s" repeatCount="indefinite"/>
        if (!token) return res.status(401).json({ error: 'No token' });
    </text>
    <text x="60" y="266.5" font-family="Consolas, Monaco, monospace" font-size="12.5" fill="#9cdcfe">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.345;0.352;0.94;1" dur="12.0s" repeatCount="indefinite"/>
        try {
    </text>
    <text x="60" y="287.0" font-family="Consolas, Monaco, monospace" font-size="12.5" fill="#9cdcfe">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.368;0.375;0.94;1" dur="12.0s" repeatCount="indefinite"/>
          req.user = jwt.verify(token, process.env.JWT_SECRET);
    </text>
    <text x="60" y="307.5" font-family="Consolas, Monaco, monospace" font-size="12.5" fill="#9cdcfe">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.392;0.398;0.94;1" dur="12.0s" repeatCount="indefinite"/>
          next();
    </text>
    <text x="60" y="328.0" font-family="Consolas, Monaco, monospace" font-size="12.5" fill="#9cdcfe">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.415;0.422;0.94;1" dur="12.0s" repeatCount="indefinite"/>
        } catch { res.status(403).json({ error: 'Invalid token' }); }
    </text>
    <text x="60" y="348.5" font-family="Consolas, Monaco, monospace" font-size="12.5" fill="#9cdcfe">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.438;0.445;0.94;1" dur="12.0s" repeatCount="indefinite"/>
      }
    </text>

    <!-- shipped by human badge -->
    <g>
      <rect x="40" y="318" width="230" height="26" rx="13" fill="#0f1420" stroke="#22c55e" stroke-width="1.2" opacity="0">
