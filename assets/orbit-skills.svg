<svg width="900" height="340" viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgOrbit" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0d1420"/>
      <stop offset="100%" stop-color="#05070c"/>
    </radialGradient>
    <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d9ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00d9ff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="frameOrbit"><rect width="900" height="340" rx="14"/></clipPath>
  </defs>

  <g clip-path="url(#frameOrbit)">
    <rect width="900" height="340" fill="url(#bgOrbit)"/>

    <!-- orbit rings -->
    <circle cx="450.0" cy="180.0" r="150" fill="none" stroke="#1f3a4d" stroke-width="1" stroke-dasharray="2 6"/>
    <circle cx="450.0" cy="180.0" r="230" fill="none" stroke="#1f3a4d" stroke-width="1" stroke-dasharray="2 6"/>

    <!-- hub glow -->
    <circle cx="450.0" cy="180.0" r="70" fill="url(#hubGlow)">
      <animate attributeName="r" values="60;74;60" dur="3s" repeatCount="indefinite"/>
    </circle>

    <!-- hub core -->
    <g transform="translate(450.0,180.0)">
      <circle r="40" fill="#0b1622" stroke="#00d9ff" stroke-width="1.5"/>
      <text text-anchor="middle" y="-4" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#00d9ff">PRATHAM</text>
      <text text-anchor="middle" y="14" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#7fdcff">full-stack</text>
    </g>

