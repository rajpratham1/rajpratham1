<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="codeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
    <clipPath id="codeFrame"><rect width="900" height="320" rx="14"/></clipPath>
  </defs>
  <g clip-path="url(#codeFrame)">
    <rect width="900" height="320" fill="url(#codeBg)"/>

    <!-- title bar -->
    <rect x="0" y="0" width="900" height="34" fill="#11111b"/>
    <circle cx="22" cy="17" r="5" fill="#ff5f56"/>
    <circle cx="40" cy="17" r="5" fill="#ffbd2e"/>
    <circle cx="58" cy="17" r="5" fill="#27c93f"/>
    <text x="450.0" y="21" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="12" fill="#a6adc8">billing/invoiceService.js</text>

    <!-- gutter line -->
    <line x1="84" y1="40" x2="84" y2="300" stroke="#313244" stroke-width="1"/>

    
    <text x="100" y="70" font-family="Consolas, Monaco, monospace" font-size="14.5">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.032;0.045;0.93;1" dur="11s" repeatCount="indefinite"/>
      <tspan fill="#c586c0">function </tspan><tspan fill="#dcdcaa">generateInvoice</tspan><tspan fill="#d4d4d4">(order) {</tspan>
    </text>
    <text x="66" y="70" font-family="Consolas, Monaco, monospace" font-size="12.5" fill="#5a6270" text-anchor="end">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.032;0.045;0.93;1" dur="11s" repeatCount="indefinite"/>
      1
    </text>
    <text x="100" y="94" font-family="Consolas, Monaco, monospace" font-size="14.5">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.077;0.091;0.93;1" dur="11s" repeatCount="indefinite"/>
      <tspan fill="#d4d4d4">  const items = order.items.map(item =&gt; ({</tspan>
    </text>
    <text x="66" y="94" font-family="Consolas, Monaco, monospace" font-size="12.5" fill="#5a6270" text-anchor="end">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.077;0.091;0.93;1" dur="11s" repeatCount="indefinite"/>
      2
    </text>
    <text x="100" y="118" font-family="Consolas, Monaco, monospace" font-size="14.5">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.123;0.136;0.93;1" dur="11s" repeatCount="indefinite"/>
      <tspan fill="#9cdcfe">    name: item.name,</tspan>
    </text>
    <text x="66" y="118" font-family="Consolas, Monaco, monospace" font-size="12.5" fill="#5a6270" text-anchor="end">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.123;0.136;0.93;1" dur="11s" repeatCount="indefinite"/>
      3
    </text>
    <text x="100" y="142" font-family="Consolas, Monaco, monospace" font-size="14.5">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.168;0.182;0.93;1" dur="11s" repeatCount="indefinite"/>
      <tspan fill="#9cdcfe">    total: item.price * item.qty</tspan>
    </text>
    <text x="66" y="142" font-family="Consolas, Monaco, monospace" font-size="12.5" fill="#5a6270" text-anchor="end">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.168;0.182;0.93;1" dur="11s" repeatCount="indefinite"/>
      4
    </text>
    <text x="100" y="166" font-family="Consolas, Monaco, monospace" font-size="14.5">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.214;0.227;0.93;1" dur="11s" repeatCount="indefinite"/>
      <tspan fill="#d4d4d4">  }));</tspan>
    </text>
    <text x="66" y="166" font-family="Consolas, Monaco, monospace" font-size="12.5" fill="#5a6270" text-anchor="end">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.214;0.227;0.93;1" dur="11s" repeatCount="indefinite"/>
      5
    </text>
    <text x="100" y="190" font-family="Consolas, Monaco, monospace" font-size="14.5">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.259;0.273;0.93;1" dur="11s" repeatCount="indefinite"/>
      <tspan fill="#d4d4d4"></tspan>
    </text>
    <text x="66" y="190" font-family="Consolas, Monaco, monospace" font-size="12.5" fill="#5a6270" text-anchor="end">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.259;0.273;0.93;1" dur="11s" repeatCount="indefinite"/>
      6
    </text>
    <text x="100" y="214" font-family="Consolas, Monaco, monospace" font-size="14.5">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.305;0.318;0.93;1" dur="11s" repeatCount="indefinite"/>
      <tspan fill="#d4d4d4">  const grandTotal = items.reduce((sum, i) =&gt; sum + i.total, 0);</tspan>
    </text>
    <text x="66" y="214" font-family="Consolas, Monaco, monospace" font-size="12.5" fill="#5a6270" text-anchor="end">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.305;0.318;0.93;1" dur="11s" repeatCount="indefinite"/>
      7
    </text>
    <text x="100" y="238" font-family="Consolas, Monaco, monospace" font-size="14.5">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.35;0.364;0.93;1" dur="11s" repeatCount="indefinite"/>
      <tspan fill="#d4d4d4">  return { items, grandTotal, status: </tspan><tspan fill="#ce9178">'paid'</tspan><tspan fill="#d4d4d4">};</tspan>
    </text>
    <text x="66" y="238" font-family="Consolas, Monaco, monospace" font-size="12.5" fill="#5a6270" text-anchor="end">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.35;0.364;0.93;1" dur="11s" repeatCount="indefinite"/>
      8
    </text>
    <text x="100" y="262" font-family="Consolas, Monaco, monospace" font-size="14.5">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.395;0.409;0.93;1" dur="11s" repeatCount="indefinite"/>
      <tspan fill="#d4d4d4">}</tspan>
    </text>
    <text x="66" y="262" font-family="Consolas, Monaco, monospace" font-size="12.5" fill="#5a6270" text-anchor="end">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.395;0.409;0.93;1" dur="11s" repeatCount="indefinite"/>
      9
    </text>

    <text x="45" y="20" font-family="Consolas, Monaco, monospace" font-size="11" fill="#585b70">1</text>
  </g>
  <rect x="0.5" y="0.5" width="899" height="319" rx="14" fill="none" stroke="#313244"/>
</svg>